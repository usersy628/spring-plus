<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>익명 채팅 테스트</title>
</head>
<body>
<h2>WebSocket 채팅 테스트</h2>

<div>
    <label>방 ID</label>
    <input id="roomId" value="room-1">
</div>

<div>
    <label>닉네임</label>
    <input id="sender" value="익명123">
</div>

<div>
    <button onclick="connect()">연결</button>
    <button onclick="disconnect()">연결 해제</button>
</div>

<hr>

<div>
    <input id="message" placeholder="메시지 입력">
    <button onclick="sendMessage()">전송</button>
</div>

<ul id="messages"></ul>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
    let stompClient = null;

    function connect() {
        const roomId = document.getElementById("roomId").value;

        const socket = new SockJS("/ws/chat");
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {
            console.log("connected");

            stompClient.subscribe("/sub/chat/rooms/" + roomId, function (message) {
                const body = JSON.parse(message.body);
                showMessage(body.sender + ": " + body.message);
            });

            showMessage("채팅방에 연결되었습니다: " + roomId);
        });
    }

    function disconnect() {
        if (stompClient !== null) {
            stompClient.disconnect();
            showMessage("연결이 해제되었습니다.");
        }
    }

    function sendMessage() {
        const roomId = document.getElementById("roomId").value;
        const sender = document.getElementById("sender").value;
        const message = document.getElementById("message").value;

        stompClient.send("/pub/chat/message", {}, JSON.stringify({
            roomId: roomId,
            sender: sender,
            message: message
        }));

        document.getElementById("message").value = "";
    }

    function showMessage(text) {
        const li = document.createElement("li");
        li.innerText = text;
        document.getElementById("messages").appendChild(li);
    }
</script>
</body>
</html>
